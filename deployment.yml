apiVersion: apps/v1
kind: Deployment

metadata:
  name: website-deployment

spec:
  replicas: 5

  selector:
    matchLabels:
      app: website

  template:
    metadata:
      labels:
        app: website

    spec:
      containers:
      - name: website-container

        image: vivekbhardwaj581/website:latest

        ports:
        - containerPort: 80
